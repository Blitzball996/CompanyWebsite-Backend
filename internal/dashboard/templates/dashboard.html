<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blitzball Labs — Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{ --bg:#0b0e14; --card:#151a24; --line:#222b3a; --txt:#e6edf3; --dim:#8b98a9; --accent:#4f8cff; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--txt); font:14px/1.5 system-ui,"Segoe UI","Microsoft YaHei",sans-serif; }
  header{ display:flex; align-items:center; gap:16px; padding:16px 24px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header h1{ font-size:18px; margin:0; }
  .spacer{ flex:1; }
  .range, .tabs{ display:flex; gap:6px; flex-wrap:wrap; }
  button.pill{ background:var(--card); color:var(--dim); border:1px solid var(--line); border-radius:20px; padding:6px 14px; cursor:pointer; }
  button.pill.active{ color:#fff; border-color:var(--accent); background:#1c2740; }
  .tab{ background:none; border:none; color:var(--dim); padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; font-size:14px; }
  .tab.active{ color:#fff; border-bottom-color:var(--accent); }
  main{ padding:24px; max-width:1200px; margin:0 auto; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:20px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; position:relative; }
  .card .label{ color:var(--dim); font-size:12px; display:flex; align-items:center; gap:5px; }
  .card .value{ font-size:26px; font-weight:700; margin-top:6px; }
  .card .value.good{ color:#3fb950; } .card .value.warn{ color:#d29922; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .box{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .box.full{ grid-column:1 / -1; }
  .box h3{ margin:0 0 12px; font-size:14px; display:flex; align-items:center; gap:6px; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top; }
  th{ color:var(--dim); font-weight:500; }
  .bar{ height:4px; background:var(--accent); border-radius:2px; margin-top:4px; opacity:.5; }
  .hint{ display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%;
         background:var(--line); color:var(--dim); font-size:10px; cursor:help; }
  .mono{ font-family:"JetBrains Mono",Consolas,monospace; font-size:12px; }
  .clickable{ cursor:pointer; color:var(--accent); }
  .clickable:hover{ text-decoration:underline; }
  .hidden{ display:none; }
  input,textarea{ width:100%; background:#0d1117; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px; font:inherit; margin-bottom:8px; }
  textarea{ min-height:90px; resize:vertical; }
  .btn{ background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; }
  .btn.danger{ background:#a32; } .btn.ghost{ background:var(--card); border:1px solid var(--line); color:var(--dim); }
  .row{ display:flex; gap:10px; } .row > *{ flex:1; }
  .note{ background:#1c2740; border:1px solid var(--accent); border-radius:8px; padding:10px 12px; color:#cdd9ec; font-size:12px; margin-bottom:16px; }
  dialog{ background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:12px; max-width:600px; width:90%; }
  @media(max-width:760px){ .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>📊 Blitzball Labs <span data-i18n="analytics">数据统计</span></h1>
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="overview" data-i18n="tab_overview">概览</button>
    <button class="tab" data-tab="regions" data-i18n="tab_regions">地区</button>
    <button class="tab" data-tab="visitors" data-i18n="tab_visitors">访客</button>
    <button class="tab" data-tab="blog" data-i18n="tab_blog">博客管理</button>
    <button class="tab" data-tab="licenses" data-i18n="tab_lic">序列号</button>
  </div>
  <div class="spacer"></div>
  <div class="range" id="range">
    <button class="pill" data-days="1">24h</button>
    <button class="pill active" data-days="7">7<span data-i18n="d">天</span></button>
    <button class="pill" data-days="30">30<span data-i18n="d">天</span></button>
    <button class="pill" data-days="90">90<span data-i18n="d">天</span></button>
  </div>
  <button class="pill" id="lang" title="中文 / English">EN</button>
</header>

<main>
  <!-- ===== OVERVIEW ===== -->
  <section id="view-overview">
    <div class="cards" id="cards"></div>
    <div class="grid">
      <div class="box full"><h3><span data-i18n="trend">访问趋势</span> (PV / UV)</h3><canvas id="trend"></canvas></div>
      <div class="box"><h3 data-i18n="top_pages">热门页面</h3><div id="pages"></div></div>
      <div class="box"><h3 data-i18n="referrers">来源 / 从哪进来</h3><div id="referrers"></div></div>
      <div class="box"><h3 data-i18n="devices">设备</h3><canvas id="devices"></canvas></div>
      <div class="box"><h3 data-i18n="browsers">浏览器</h3><canvas id="browsers"></canvas></div>
      <div class="box"><h3 data-i18n="os">操作系统</h3><div id="os"></div></div>
      <div class="box"><h3 data-i18n="langs">语言</h3><div id="langs"></div></div>
      <div class="box full"><h3 data-i18n="events">自定义事件</h3><div id="events"></div></div>
    </div>
  </section>

  <!-- ===== REGIONS ===== -->
  <section id="view-regions" class="hidden">
    <div class="range" style="margin-bottom:16px">
      <button class="pill" data-level="country" data-i18n="lv_country">国家</button>
      <button class="pill active" data-level="province" data-i18n="lv_province">省份</button>
      <button class="pill" data-level="city" data-i18n="lv_city">城市</button>
    </div>
    <div class="box full"><h3 data-i18n="region_rank">地区访问排行</h3><div id="regions"></div></div>
  </section>

  <!-- ===== VISITORS ===== -->
  <section id="view-visitors" class="hidden">
    <div class="note" id="ip-note"></div>
    <div class="box full">
      <h3 data-i18n="visitor_list">访客列表（点一行看完整浏览轨迹）</h3>
      <div id="visitors"></div>
    </div>
  </section>

  <!-- ===== BLOG ===== -->
  <section id="view-blog" class="hidden">
    <div class="box full" style="margin-bottom:16px">
      <h3 data-i18n="blog_new">写一篇新动态 / 博客</h3>
      <input id="b-title-zh" placeholder="标题（中文）">
      <input id="b-title-en" placeholder="Title (English)">
      <textarea id="b-body-zh" placeholder="正文（中文，支持纯文本/简单 HTML）"></textarea>
      <textarea id="b-body-en" placeholder="Body (English)"></textarea>
      <input id="b-cover" placeholder="封面图 URL（可选）">
      <div class="row" style="align-items:center">
        <label style="flex:0 0 auto"><input type="checkbox" id="b-pub" checked style="width:auto"> <span data-i18n="publish">发布</span></label>
        <div class="spacer"></div>
        <button class="btn ghost" id="b-reset" data-i18n="reset">清空</button>
        <button class="btn" id="b-save" data-i18n="save">保存</button>
      </div>
    </div>
    <div class="box full"><h3 data-i18n="blog_list">已有文章</h3><div id="posts"></div></div>
  </section>

  <!-- ===== LICENSES ===== -->
  <section id="view-licenses" class="hidden">
    <div class="box full" style="margin-bottom:16px">
      <h3 data-i18n="lic_gen">签发序列号</h3>
      <div class="row" style="align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <label style="font-size:12px;color:var(--dim)" data-i18n="lic_product">产品 / 版本</label>
          <select id="lic-prod">
            <option value="BDPR">Blitz DAW · Pro (BDPR)</option>
            <option value="BDST">Blitz DAW · Standard (BDST)</option>
            <option value="CCPR">CloseCrab · Pro (CCPR)</option>
            <option value="CCST">CloseCrab · Standard (CCST)</option>
          </select>
        </div>
        <div style="flex:0 0 90px"><label style="font-size:12px;color:var(--dim)" data-i18n="lic_count">数量</label><input id="lic-count" type="number" value="1" min="1" max="500"></div>
        <div style="flex:1;min-width:140px"><label style="font-size:12px;color:var(--dim)" data-i18n="lic_order">订单号(可选)</label><input id="lic-order" placeholder="ORDER-..."></div>
        <div style="flex:1;min-width:160px"><label style="font-size:12px;color:var(--dim)" data-i18n="lic_email">买家邮箱(可选)</label><input id="lic-email" placeholder="buyer@example.com"></div>
        <button class="btn" id="lic-gen-btn" data-i18n="lic_gen_btn">生成</button>
      </div>
      <div id="lic-gen-out" style="margin-top:10px"></div>
    </div>
    <div class="box full">
      <h3 data-i18n="lic_list">已签发序列号</h3>
      <div id="licenses"></div>
    </div>
  </section>
</main>

<!-- journey modal -->
<dialog id="journey">
  <div style="padding:18px">
    <div style="display:flex;align-items:center"><h3 style="margin:0" data-i18n="journey">浏览轨迹</h3><div class="spacer"></div><button class="btn ghost" onclick="document.getElementById('journey').close()">✕</button></div>
    <div id="journey-body" style="margin-top:12px"></div>
  </div>
</dialog>
<script>
/* ===== i18n dictionary ===== */
var I18N = {
  zh:{ analytics:"数据统计", tab_overview:"概览", tab_regions:"地区", tab_visitors:"访客", tab_blog:"博客管理",
    d:"天", trend:"访问趋势", top_pages:"热门页面", referrers:"来源 / 从哪进来", devices:"设备", browsers:"浏览器",
    os:"操作系统", langs:"语言", events:"自定义事件", lv_country:"国家", lv_province:"省份", lv_city:"城市",
    region_rank:"地区访问排行", visitor_list:"访客列表（点一行看完整浏览轨迹）", blog_new:"写一篇新动态 / 博客",
    publish:"发布", reset:"清空", save:"保存", blog_list:"已有文章", journey:"浏览轨迹",
    pv:"浏览量 PV", uv:"访客数 UV", sessions:"会话数", avgdur:"平均停留", bounce:"跳出率", live:"当前在线",
    visitor:"访客", ip:"IP地址", location:"位置", isp:"运营商", device:"设备", pages_n:"页数", last:"最近访问",
    label:"名称", count:"次数", time:"时间", page:"页面", action:"动作", title:"标题", status:"状态",
    op:"操作", edit:"编辑", del:"删除", draft:"草稿", published_s:"已发布", none:"暂无数据",
    confirm_del:"确定删除这篇文章？", saved:"已保存", dur:"停留", scroll:"滚动",
    ip_on:"⚠️ 当前已开启「存储明文IP」。访客真实IP会被记录，这属于收集个人信息，请确保你已在隐私政策中告知访客并符合当地法律（如《个人信息保护法》/GDPR）。位置基于离线IP库，可靠精度到「市/区县」级，无法精确到街道。",
    ip_off:"ℹ️ 当前未存储明文IP（隐私模式）。只显示地区统计，看不到具体某人的IP。如需看IP，把后端 STORE_IP 设为 true。",
    tab_lic:"序列号", lic_gen:"签发序列号", lic_product:"产品 / 版本", lic_count:"数量", lic_order:"订单号(可选)", lic_email:"买家邮箱(可选)",
    lic_gen_btn:"生成", lic_list:"已签发序列号", lic_key:"序列号", lic_prod_col:"产品", lic_bound:"绑定设备", lic_revoke:"封禁", lic_reset:"换机解绑",
    lic_active:"有效", lic_revoked:"已封禁", lic_unused:"未激活", lic_copied:"已复制", confirm_revoke:"确定封禁这个序列号？(用户将无法激活)", confirm_reset:"清除设备绑定？用户可在新机器上重新激活。" },
  en:{ analytics:"Analytics", tab_overview:"Overview", tab_regions:"Regions", tab_visitors:"Visitors", tab_blog:"Blog",
    d:"d", trend:"Traffic Trend", top_pages:"Top Pages", referrers:"Referrers", devices:"Devices", browsers:"Browsers",
    os:"OS", langs:"Languages", events:"Custom Events", lv_country:"Country", lv_province:"Province", lv_city:"City",
    region_rank:"Visits by Region", visitor_list:"Visitors (click a row for full journey)", blog_new:"New Post",
    publish:"Publish", reset:"Reset", save:"Save", blog_list:"Posts", journey:"Visit Journey",
    pv:"Pageviews (PV)", uv:"Unique Visitors (UV)", sessions:"Sessions", avgdur:"Avg Duration", bounce:"Bounce Rate", live:"Live Now",
    visitor:"Visitor", ip:"IP", location:"Location", isp:"ISP", device:"Device", pages_n:"Pages", last:"Last Seen",
    label:"Label", count:"Count", time:"Time", page:"Page", action:"Action", title:"Title", status:"Status",
    op:"Actions", edit:"Edit", del:"Delete", draft:"Draft", published_s:"Published", none:"No data",
    confirm_del:"Delete this post?", saved:"Saved", dur:"Stay", scroll:"Scroll",
    ip_on:"⚠️ Raw IP storage is ON. Real visitor IPs are recorded — this is personal data; ensure your privacy policy discloses it and you comply with local law (PIPL/GDPR). Location is from an offline IP db, reliable to city level, not street.",
    ip_off:"ℹ️ Raw IP storage is OFF (privacy mode). Only regional stats are shown. To see IPs, set backend STORE_IP=true.",
    tab_lic:"Licenses", lic_gen:"Issue license keys", lic_product:"Product / edition", lic_count:"Count", lic_order:"Order ID (optional)", lic_email:"Buyer email (optional)",
    lic_gen_btn:"Generate", lic_list:"Issued license keys", lic_key:"Key", lic_prod_col:"Product", lic_bound:"Bound device", lic_revoke:"Revoke", lic_reset:"Reset device",
    lic_active:"active", lic_revoked:"revoked", lic_unused:"not activated", lic_copied:"copied", confirm_revoke:"Revoke this key? (user can no longer activate)", confirm_reset:"Clear device binding? User can re-activate on a new machine." }
};
var TIP = {
  zh:{ pv:"Page View：页面被打开的总次数，刷新一次算一次。",
       uv:"Unique Visitor：独立访客数，同一人当天多次访问只算1个（按 IP+设备 每日哈希去重）。",
       sessions:"会话数：一次连续浏览算一个会话，关闭标签页或长时间无操作后重新访问算新会话。",
       avgdur:"平均每个页面被停留的时长。", bounce:"只看了一个页面就离开的会话占比，越低说明内容越吸引人。",
       live:"最近5分钟内还在访问的人数。" },
  en:{ pv:"Page View: total times pages were opened; each refresh counts.",
       uv:"Unique Visitor: distinct people; multiple visits by the same person in a day count once (daily hash of IP+device).",
       sessions:"A session is one continuous browsing visit; reopening after closing/idle starts a new one.",
       avgdur:"Average time spent per page.", bounce:"Share of sessions that viewed only one page; lower is better.",
       live:"People active in the last 5 minutes." }
};
var lang = localStorage.getItem('bz_lang') || 'zh';
var days = 7, regionLevel = 'province', storeIP = false;
var charts = {};
var T = function(k){ return (I18N[lang][k]!==undefined?I18N[lang][k]:k); };
function $(s){ return document.querySelector(s); }
function get(path){ return fetch(path,{credentials:'same-origin'}).then(function(r){return r.json();}); }
function fmtDur(ms){ if(!ms) return '0s'; var s=Math.round(ms/1000); return s<60? s+'s' : Math.floor(s/60)+'m '+(s%60)+'s'; }
function fmtTime(t){ try{ return new Date(t).toLocaleString(lang==='zh'?'zh-CN':'en-US'); }catch(e){ return t; } }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = T(el.getAttribute('data-i18n'));
  });
  document.documentElement.lang = lang;
  $('#lang').textContent = (lang==='zh'?'EN':'中');
}
/*MORE_SCRIPT*/
/* ===== render helpers ===== */
function tableView(el, rows){
  if(!rows || !rows.length){ el.innerHTML = '<div style="color:var(--dim)">'+T('none')+'</div>'; return; }
  var max = Math.max.apply(null, rows.map(function(r){return r.count;}));
  el.innerHTML = '<table><thead><tr><th>'+T('label')+'</th><th style="text-align:right">'+T('count')+'</th></tr></thead><tbody>'+
    rows.map(function(r){
      var w = max? Math.round(r.count/max*100):0;
      return '<tr><td>'+esc(r.label)+'<div class="bar" style="width:'+w+'%"></div></td><td style="text-align:right">'+r.count+'</td></tr>';
    }).join('')+'</tbody></table>';
}
function donut(id, rows){
  var ctx = $('#'+id); if(!ctx) return;
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, { type:'doughnut',
    data:{ labels:(rows||[]).map(function(r){return r.label;}),
      datasets:[{ data:(rows||[]).map(function(r){return r.count;}),
        backgroundColor:['#4f8cff','#3fb950','#d29922','#a371f7','#f778ba','#56d4dd','#8b98a9'] }] },
    options:{ plugins:{legend:{position:'right',labels:{color:'#8b98a9'}}} } });
}

/* ===== overview ===== */
async function loadOverview(){
  var s = await get('/api/stats/summary?days='+days);
  var cards = [
    ['pv', s.pv, ''], ['uv', s.uv, ''], ['sessions', s.sessions, ''],
    ['avgdur', fmtDur(s.avg_duration_ms), ''],
    ['bounce', (s.bounce_rate||0).toFixed(1)+'%', s.bounce_rate>70?'warn':''],
    ['live', s.live, 'good']
  ];
  $('#cards').innerHTML = cards.map(function(c){
    var tip = (TIP[lang][c[0]]||'');
    return '<div class="card"><div class="label">'+T(c[0])+
      ' <span class="hint" title="'+esc(tip)+'">?</span></div>'+
      '<div class="value '+(c[2]||'')+'">'+c[1]+'</div></div>';
  }).join('');

  var tr = await get('/api/stats/trend?days='+days);
  if(charts.trend) charts.trend.destroy();
  charts.trend = new Chart($('#trend'), { type:'line',
    data:{ labels:tr.map(function(p){return p.date;}),
      datasets:[
        {label:'PV',data:tr.map(function(p){return p.pv;}),borderColor:'#4f8cff',tension:.3},
        {label:'UV',data:tr.map(function(p){return p.uv;}),borderColor:'#3fb950',tension:.3}
      ]},
    options:{ plugins:{legend:{labels:{color:'#8b98a9'}}},
      scales:{x:{ticks:{color:'#8b98a9'}},y:{ticks:{color:'#8b98a9'}}} } });

  get('/api/stats/pages?days='+days).then(function(d){tableView($('#pages'),d);});
  get('/api/stats/referrers?days='+days).then(function(d){tableView($('#referrers'),d);});
  get('/api/stats/devices?days='+days).then(function(d){donut('devices',d);});
  get('/api/stats/browsers?days='+days).then(function(d){donut('browsers',d);});
  get('/api/stats/os?days='+days).then(function(d){tableView($('#os'),d);});
  get('/api/stats/langs?days='+days).then(function(d){tableView($('#langs'),d);});
  get('/api/stats/events?days='+days).then(function(d){tableView($('#events'),d);});
}

/* ===== regions ===== */
function loadRegions(){
  get('/api/stats/regions?level='+regionLevel+'&days='+days).then(function(d){ tableView($('#regions'), d); });
}

/* ===== visitors ===== */
async function loadVisitors(){
  var s = await get('/api/stats/summary?days='+days); // cheap way to read storeIP? no—use note text only
  $('#ip-note').textContent = storeIP ? T('ip_on') : T('ip_off');
  var v = await get('/api/stats/visitors?days='+days);
  if(!v || !v.length){ $('#visitors').innerHTML='<div style="color:var(--dim)">'+T('none')+'</div>'; return; }
  $('#visitors').innerHTML = '<table><thead><tr>'+
    '<th>'+T('ip')+'</th><th>'+T('location')+'</th><th>'+T('isp')+'</th><th>'+T('device')+'</th>'+
    '<th style="text-align:right">PV</th><th style="text-align:right">'+T('sessions')+'</th><th>'+T('last')+'</th></tr></thead><tbody>'+
    v.map(function(x){
      var loc = [x.country,x.province,x.city].filter(Boolean).join(' / ') || '-';
      var ipShown = x.ip || (storeIP?'-':'(未存)');
      return '<tr class="clickable" data-id="'+esc(x.visitor_id)+'">'+
        '<td class="mono">'+esc(ipShown)+'</td><td>'+esc(loc)+'</td><td>'+esc(x.isp||'-')+'</td>'+
        '<td>'+esc([x.device,x.browser,x.os].filter(Boolean).join(' '))+'</td>'+
        '<td style="text-align:right">'+x.pv+'</td><td style="text-align:right">'+x.sessions+'</td>'+
        '<td>'+fmtTime(x.last_seen)+'</td></tr>';
    }).join('')+'</tbody></table>';
  $('#visitors').querySelectorAll('tr.clickable').forEach(function(tr){
    tr.onclick = function(){ openJourney(tr.getAttribute('data-id')); };
  });
}
async function openJourney(id){
  var steps = await get('/api/stats/journey?id='+encodeURIComponent(id));
  var body = $('#journey-body');
  if(!steps || !steps.length){ body.innerHTML = T('none'); }
  else {
    body.innerHTML = '<table><thead><tr><th>'+T('time')+'</th><th>'+T('page')+'</th><th>'+T('action')+'</th>'+
      '<th>'+T('dur')+'</th><th>'+T('scroll')+'</th></tr></thead><tbody>'+
      steps.map(function(s){
        var act = s.type==='event'? (s.name||'event') : (s.name==='engagement'?'(leave)':'view');
        return '<tr><td class="mono">'+fmtTime(s.time)+'</td><td>'+esc(s.page)+
          '<div style="color:var(--dim);font-size:11px">'+esc(s.title)+'</div></td>'+
          '<td>'+esc(act)+'</td><td>'+fmtDur(s.duration_ms)+'</td><td>'+(s.scroll_pct||0)+'%</td></tr>';
      }).join('')+'</tbody></table>';
  }
  $('#journey').showModal();
}

/* ===== blog admin ===== */
async function loadPosts(){
  var ps = await get('/api/admin/posts');
  if(!ps || !ps.length){ $('#posts').innerHTML='<div style="color:var(--dim)">'+T('none')+'</div>'; return; }
  $('#posts').innerHTML = '<table><thead><tr><th>'+T('title')+'</th><th>'+T('status')+'</th><th>'+T('time')+'</th><th>'+T('op')+'</th></tr></thead><tbody>'+
    ps.map(function(p){
      var t = lang==='zh'? (p.title_zh||p.title_en) : (p.title_en||p.title_zh);
      return '<tr><td>'+esc(t)+'</td>'+
        '<td>'+(p.published?T('published_s'):T('draft'))+'</td>'+
        '<td>'+fmtTime(p.created_at)+'</td>'+
        '<td><button class="btn ghost" data-edit=\''+esc(JSON.stringify(p))+'\'>'+T('edit')+'</button> '+
        '<button class="btn danger" data-del="'+p.id+'">'+T('del')+'</button></td></tr>';
    }).join('')+'</tbody></table>';
  $('#posts').querySelectorAll('[data-del]').forEach(function(b){
    b.onclick = async function(){ if(!confirm(T('confirm_del')))return;
      await fetch('/api/admin/posts/'+b.getAttribute('data-del'),{method:'DELETE',credentials:'same-origin'}); loadPosts(); };
  });
  $('#posts').querySelectorAll('[data-edit]').forEach(function(b){
    b.onclick = function(){ var p=JSON.parse(b.getAttribute('data-edit'));
      editId=p.id; $('#b-title-zh').value=p.title_zh; $('#b-title-en').value=p.title_en;
      $('#b-body-zh').value=p.body_zh; $('#b-body-en').value=p.body_en; $('#b-cover').value=p.cover_url||'';
      $('#b-pub').checked=p.published; window.scrollTo(0,0); };
  });
}
var editId = 0;
function resetForm(){ editId=0; ['#b-title-zh','#b-title-en','#b-body-zh','#b-body-en','#b-cover'].forEach(function(s){$(s).value='';}); $('#b-pub').checked=true; }
async function savePost(){
  var body = { title_zh:$('#b-title-zh').value, title_en:$('#b-title-en').value,
    body_zh:$('#b-body-zh').value, body_en:$('#b-body-en').value,
    cover_url:$('#b-cover').value, published:$('#b-pub').checked };
  var url = editId? '/api/admin/posts/'+editId : '/api/admin/posts';
  var method = editId? 'PUT':'POST';
  var res = await fetch(url,{method:method,credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){ resetForm(); loadPosts(); } else { alert('Error: '+res.status); }
}

/* ===== licenses (serial numbers) ===== */
async function loadLicenses(){
  var rows = await get('/api/admin/licenses');
  var el = $('#licenses');
  if(!rows || !rows.length){ el.innerHTML='<div style="color:var(--dim)">'+T('none')+'</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>'+T('lic_key')+'</th><th>'+T('lic_prod_col')+'</th><th>'+T('status')+'</th>'+
    '<th>'+T('lic_bound')+'</th><th>'+T('time')+'</th><th>'+T('op')+'</th></tr></thead><tbody>'+
    rows.map(function(x){
      var st = x.status==='revoked' ? '<span style="color:#f7768e">'+T('lic_revoked')+'</span>'
        : (x.device_id ? '<span style="color:#3fb950">'+T('lic_active')+'</span>' : '<span style="color:var(--dim)">'+T('lic_unused')+'</span>');
      var dev = x.device_id ? '<span class="mono" style="font-size:11px">'+esc(x.device_id.slice(0,16))+'…</span>' : '-';
      return '<tr><td class="mono clickable" data-copy="'+esc(x.key)+'" title="'+T('lic_copied')+'">'+esc(x.key)+'</td>'+
        '<td>'+esc(x.product)+'</td><td>'+st+'</td><td>'+dev+'</td>'+
        '<td>'+fmtTime(x.created_at)+'</td>'+
        '<td><button class="btn ghost" data-reset="'+esc(x.key)+'">'+T('lic_reset')+'</button> '+
        '<button class="btn danger" data-revoke="'+esc(x.key)+'">'+T('lic_revoke')+'</button></td></tr>';
    }).join('')+'</tbody></table>';
  el.querySelectorAll('[data-copy]').forEach(function(b){ b.onclick=function(){ navigator.clipboard&&navigator.clipboard.writeText(b.getAttribute('data-copy')); b.style.color='var(--cyan-bright)'; }; });
  el.querySelectorAll('[data-revoke]').forEach(function(b){ b.onclick=async function(){ if(!confirm(T('confirm_revoke')))return;
    await fetch('/api/admin/licenses/'+encodeURIComponent(b.getAttribute('data-revoke'))+'/revoke',{method:'POST',credentials:'same-origin'}); loadLicenses(); }; });
  el.querySelectorAll('[data-reset]').forEach(function(b){ b.onclick=async function(){ if(!confirm(T('confirm_reset')))return;
    await fetch('/api/admin/licenses/'+encodeURIComponent(b.getAttribute('data-reset'))+'/reset-device',{method:'POST',credentials:'same-origin'}); loadLicenses(); }; });
}
async function genLicenses(){
  var body={ product:$('#lic-prod').value, count:+$('#lic-count').value||1,
    order_id:$('#lic-order').value, email:$('#lic-email').value };
  var res=await fetch('/api/admin/licenses',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){ var d=await res.json();
    $('#lic-gen-out').innerHTML='<div class="note" style="user-select:all">'+(d.keys||[]).map(esc).join('<br>')+'</div>';
    loadLicenses();
  } else { alert('Error: '+res.status); }
}

/* ===== view routing ===== */
function showView(name){
  ['overview','regions','visitors','blog','licenses'].forEach(function(v){
    $('#view-'+v).classList.toggle('hidden', v!==name);
  });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.getAttribute('data-tab')===name); });
  if(name==='overview') loadOverview();
  if(name==='regions') loadRegions();
  if(name==='visitors') loadVisitors();
  if(name==='blog') loadPosts();
  if(name==='licenses') loadLicenses();
}
var currentView = 'overview';

/* ===== wire events ===== */
document.querySelectorAll('.tab').forEach(function(t){
  t.onclick = function(){ currentView=t.getAttribute('data-tab'); showView(currentView); };
});
$('#range').querySelectorAll('[data-days]').forEach(function(b){
  b.onclick = function(){ days=+b.getAttribute('data-days');
    $('#range').querySelectorAll('.pill').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
    showView(currentView); };
});
$('#view-regions').querySelectorAll('[data-level]').forEach(function(b){
  b.onclick = function(){ regionLevel=b.getAttribute('data-level');
    $('#view-regions').querySelectorAll('.pill').forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
    loadRegions(); };
});
$('#lang').onclick = function(){ lang=(lang==='zh'?'en':'zh'); localStorage.setItem('bz_lang',lang); applyI18n(); showView(currentView); };
$('#b-save').onclick = savePost;
$('#b-reset').onclick = resetForm;
$('#lic-gen-btn').onclick = genLicenses;

/* detect storeIP by probing: visitors endpoint returns ip when on */
get('/api/stats/visitors?days=1').then(function(v){ storeIP = !!(v && v.length && v[0].ip); }).catch(function(){});

applyI18n();
showView('overview');

</script>
</body>
</html>
