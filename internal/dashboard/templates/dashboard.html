<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blitzball Labs — Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0a12; --panel:#14141f; --panel2:#1b1b2b; --line:#2a2a40;
    --txt:#e8e8f5; --dim:#9a9ab5; --purple:#a855f7; --cyan:#22d3ee;
    --green:#34d399; --amber:#fbbf24;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px;border-bottom:1px solid var(--line);
    background:linear-gradient(90deg,rgba(168,85,247,.08),rgba(34,211,238,.06))}
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.5px}
  header h1 span{background:linear-gradient(90deg,var(--purple),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .range select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:8px 12px;font-size:13px}
  main{padding:24px 28px;max-width:1280px;margin:0 auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .label{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
  .card .value{font-size:28px;font-weight:700;margin-top:6px}
  .card .value.live{color:var(--green)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .grid .full{grid-column:1/-1}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .box h3{margin:0 0 14px;font-size:14px;color:var(--dim);font-weight:600;
    text-transform:uppercase;letter-spacing:.6px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td{padding:7px 4px;border-bottom:1px solid var(--line)}
  td:last-child{text-align:right;color:var(--cyan);font-variant-numeric:tabular-nums}
  .bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--cyan));margin-top:4px}
  canvas{max-height:280px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  footer{text-align:center;color:var(--dim);padding:24px;font-size:12px}
</style>
</head>
<body>
<header>
  <h1>⚡ <span>Blitzball Labs</span> Analytics</h1>
  <div class="range">
    <select id="range">
      <option value="1">Today</option>
      <option value="7" selected>Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="90">Last 90 days</option>
    </select>
  </div>
</header>
<main>
  <div class="cards" id="cards"></div>
  <div class="grid">
    <div class="box full"><h3>Traffic Trend (PV / UV)</h3><canvas id="trend"></canvas></div>
    <div class="box"><h3>Top Pages</h3><div id="pages"></div></div>
    <div class="box"><h3>Referrers</h3><div id="referrers"></div></div>
    <div class="box"><h3>Devices</h3><canvas id="devices"></canvas></div>
    <div class="box"><h3>Browsers</h3><canvas id="browsers"></canvas></div>
    <div class="box"><h3>Operating System</h3><div id="os"></div></div>
    <div class="box"><h3>Languages</h3><div id="langs"></div></div>
    <div class="box full"><h3>Custom Events</h3><div id="events"></div></div>
  </div>
</main>
<footer>Blitzball Labs · self-hosted · privacy-friendly (no cookies)</footer>
<script>
const $ = s => document.querySelector(s);
const COLORS = ['#a855f7','#22d3ee','#34d399','#fbbf24','#f472b6','#60a5fa','#f87171','#a3e635'];
let charts = {};

function get(path){ return fetch(path, {credentials:'same-origin'}).then(r=>r.json()); }
function fmtDur(ms){ if(!ms) return '0s'; const s=Math.round(ms/1000); return s<60? s+'s' : Math.floor(s/60)+'m '+(s%60)+'s'; }

function tableView(el, rows){
  if(!rows || !rows.length){ el.innerHTML='<p style="color:var(--dim)">No data yet.</p>'; return; }
  const max = Math.max(...rows.map(r=>r.count));
  el.innerHTML = '<table>'+rows.map(r=>{
    const w = max? Math.round(r.count/max*100):0;
    const label = (r.label||'(none)').replace(/</g,'&lt;');
    return `<tr><td>${label}<div class="bar" style="width:${w}%"></div></td><td>${r.count}</td></tr>`;
  }).join('')+'</table>';
}

function donut(id, rows){
  if(charts[id]) charts[id].destroy();
  const ctx = $('#'+id);
  charts[id] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:(rows||[]).map(r=>r.label), datasets:[{ data:(rows||[]).map(r=>r.count),
      backgroundColor:COLORS, borderColor:'#14141f', borderWidth:2 }]},
    options:{ plugins:{ legend:{ labels:{ color:'#9a9ab5', boxWidth:12 } } } }
  });
}

async function load(){
  const d = $('#range').value;
  const [sum, trend, pages, refs, dev, br, os, langs, events] = await Promise.all([
    get('/api/stats/summary?days='+d),
    get('/api/stats/trend?days='+d),
    get('/api/stats/pages?days='+d),
    get('/api/stats/referrers?days='+d),
    get('/api/stats/devices?days='+d),
    get('/api/stats/browsers?days='+d),
    get('/api/stats/os?days='+d),
    get('/api/stats/langs?days='+d),
    get('/api/stats/events?days='+d),
  ]);

  $('#cards').innerHTML = [
    ['Page Views', sum.pv],
    ['Unique Visitors', sum.uv],
    ['Sessions', sum.sessions],
    ['Avg. Duration', fmtDur(sum.avg_duration_ms)],
    ['Bounce Rate', (sum.bounce_rate||0).toFixed(1)+'%'],
    ['Live (5m)', sum.live, 'live'],
  ].map(([l,v,c])=>`<div class="card"><div class="label">${l}</div><div class="value ${c||''}">${v}</div></div>`).join('');

  // trend line
  if(charts.trend) charts.trend.destroy();
  charts.trend = new Chart($('#trend'), {
    type:'line',
    data:{ labels:trend.map(p=>p.date), datasets:[
      {label:'PV', data:trend.map(p=>p.pv), borderColor:'#a855f7', backgroundColor:'rgba(168,85,247,.12)', fill:true, tension:.35},
      {label:'UV', data:trend.map(p=>p.uv), borderColor:'#22d3ee', backgroundColor:'rgba(34,211,238,.12)', fill:true, tension:.35},
    ]},
    options:{ plugins:{legend:{labels:{color:'#9a9ab5'}}},
      scales:{ x:{ticks:{color:'#9a9ab5'},grid:{color:'#2a2a40'}},
               y:{ticks:{color:'#9a9ab5'},grid:{color:'#2a2a40'},beginAtZero:true} } }
  });

  tableView($('#pages'), pages);
  tableView($('#referrers'), refs);
  tableView($('#os'), os);
  tableView($('#langs'), langs);
  tableView($('#events'), events);
  donut('devices', dev);
  donut('browsers', br);
}

$('#range').addEventListener('change', load);
load();
setInterval(load, 30000); // auto-refresh every 30s
</script>
</body>
</html>
