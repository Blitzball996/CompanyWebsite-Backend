services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8090
      DATABASE_URL: postgres://analytics:analytics@db:5432/analytics?sslmode=disable
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASS: ${DASHBOARD_PASS:-change-me-please}
      VISITOR_SALT: ${VISITOR_SALT:-please-change-this-random-salt}
    ports:
      - "8090:8090"
