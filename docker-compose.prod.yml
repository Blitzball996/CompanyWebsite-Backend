# Production stack: Postgres + Go backend + Caddy (auto HTTPS).
# Only Caddy is exposed to the public internet (ports 80/443).
# Postgres and the Go server have NO public ports — they talk over the internal
# Docker network only. Run with:  docker compose -f docker-compose.prod.yml up -d --build
#
# Required env (put in a .env file next to this one — see deploy/.env.example):
#   SITE_DOMAIN, DASHBOARD_PASS, VISITOR_SALT   (DB_PASSWORD/STORE_IP optional)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${DB_PASSWORD:-analytics}
      POSTGRES_DB: analytics
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8090
      DATABASE_URL: postgres://analytics:${DB_PASSWORD:-analytics}@db:5432/analytics?sslmode=disable
      ALLOWED_ORIGINS: https://${SITE_DOMAIN}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASS: ${DASHBOARD_PASS:?set DASHBOARD_PASS in .env}
      VISITOR_SALT: ${VISITOR_SALT:?set VISITOR_SALT in .env}
      STORE_IP: ${STORE_IP:-true}
      GEO_DB_PATH: internal/geo/data/ip2region.xdb
      # Optional: set a fixed Ed25519 signing key (base64). If empty, one is
      # generated and persisted in the mounted volume below (stable across rebuilds).
      LICENSE_PRIVATE_KEY: ${LICENSE_PRIVATE_KEY:-}
      LICENSE_KEY_PATH: internal/license/data/ed25519.key
      # Payments: auto-issue license on payment + email it (all optional)
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Customer accounts: links in verification/reset emails + secure cookies
      APP_BASE_URL: ${APP_BASE_URL:-https://${SITE_DOMAIN}}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      # Persist the license signing key so it survives container rebuilds —
      # otherwise the public key changes and already-activated apps break.
      - ./license_data:/app/internal/license/data
    # NOTE: intentionally no "ports:" — not reachable from the public internet.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../CompanyWebsite:/srv:ro        # the frontend repo, cloned as a sibling dir
      - ./caddy_data:/data               # persisted TLS certificates
      - ./caddy_config:/config
